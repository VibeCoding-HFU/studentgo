name: Android APK

on:
  workflow_call:
    inputs:
      release_signing:
        description: Sign with secrets from the android-release environment
        required: false
        type: boolean
        default: false
    secrets:
      ANDROID_KEYSTORE_BASE64:
        required: false
      ANDROID_KEYSTORE_PASSWORD:
        required: false
      ANDROID_KEY_ALIAS:
        required: false
      ANDROID_KEY_PASSWORD:
        required: false
  workflow_dispatch:
    inputs:
      release_signing:
        description: Sign with secrets from the android-release environment
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  test-apk:
    name: Build test-signed APK
    if: ${{ !inputs.release_signing }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build test APK
        uses: ./.github/actions/build-android-apk
        with:
          api-url: ${{ vars.APP_API_URL }}
          artifact-name: studentgo-test-apk

  release-apk:
    name: Build release-signed APK
    if: ${{ inputs.release_signing }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: android-release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build signed release APK
        uses: ./.github/actions/build-android-apk
        with:
          api-url: ${{ vars.APP_API_URL }}
          artifact-name: studentgo-release-apk
          release-signing: "true"
          keystore-base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          keystore-password: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          key-alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          key-password: ${{ secrets.ANDROID_KEY_PASSWORD }}
