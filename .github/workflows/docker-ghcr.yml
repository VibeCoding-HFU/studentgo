name: Docker images

on:
  workflow_call:
    inputs:
      push:
        description: Push images to GHCR
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      push:
        description: Push images to GHCR
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ matrix.component }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            dockerfile: Dockerfile.backend
            build_args: ""
          - component: frontend
            dockerfile: Dockerfile.web
            build_args: EXPO_PUBLIC_API_URL=${{ vars.APP_API_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize image name
        id: image
        shell: bash
        run: echo "repository=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: ${{ inputs.push }}
          build-args: ${{ matrix.build_args }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.repository }}/${{ matrix.component }}:latest
            ${{ env.REGISTRY }}/${{ steps.image.outputs.repository }}/${{ matrix.component }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.component }}-arm64
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}-arm64
