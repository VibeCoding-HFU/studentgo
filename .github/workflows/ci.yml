name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      push_images:
        description: Push Docker images to GHCR
        required: false
        type: boolean
        default: false
      release_signing:
        description: Build the APK with android-release environment secrets
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  quality:
    name: Lint, typecheck, and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint GitHub Actions workflows
        uses: docker://rhysd/actionlint:1.7.7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run ESLint
        run: npm run lint -- --max-warnings=0

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

  docker:
    name: Build Docker images
    needs: quality
    uses: ./.github/workflows/docker-ghcr.yml
    with:
      push: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.push_images) }}

  apk:
    name: Build Android APK
    needs: docker
    uses: ./.github/workflows/android-apk.yml
    with:
      release_signing: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.release_signing) }}
    secrets: inherit
