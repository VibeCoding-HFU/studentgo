services:
  backend:
    image: "${STUDENTGO_BACKEND_IMAGE:-studentgo-backend:dev}"
    platform: "${STUDENTGO_PLATFORM:-linux/amd64}"
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: "file:/data/studentgo.db"
      CORS_ORIGIN: "${DOCKER_CORS_ORIGIN:-http://localhost:8080}"
      APP_URL: "${DOCKER_APP_URL:-http://localhost:8080}"
      MENSA_API_KEY: "${MENSA_API_KEY:-}"
      GMAIL_USER: "${GMAIL_USER:-}"
      GMAIL_APP_PASSWORD: "${GMAIL_APP_PASSWORD:-}"
      MAIL_FROM: "${MAIL_FROM:-}"
    volumes:
      - studentgo-dev-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    image: "${STUDENTGO_FRONTEND_IMAGE:-studentgo-frontend:dev}"
    platform: "${STUDENTGO_PLATFORM:-linux/amd64}"
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        EXPO_PUBLIC_API_URL: "${EXPO_PUBLIC_API_URL:-}"
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  studentgo-dev-data:
